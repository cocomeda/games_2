<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC 巡回カウンター</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        
        /* 円形進捗バーのスタイル */
        .progress-ring { position: relative; width: 200px; height: 200px; margin: 20px auto; }
        .progress-ring svg { transform: rotate(-90deg); }
        .progress-ring circle {
            fill: transparent;
            stroke-width: 15;
            stroke-linecap: round;
        }
        .bg-circle { stroke: #e6e6e6; }
        .fg-circle {
            stroke: #007bff;
            stroke-dasharray: 565.48; /* 周長: 2 * PI * 90 */
            stroke-dashoffset: 565.48;
            transition: stroke-dashoffset 0.5s ease;
        }
        .count-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 2.5rem; font-weight: bold;
        }

        .tag-list { text-align: left; background: #f8f9fa; padding: 10px; border-radius: 10px; margin-bottom: 20px; font-size: 0.8rem; }
        button { background: #007bff; color: white; border: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; margin: 5px; }
        button:disabled { background: #ccc; }
        .setup-only { display: block; }
        .play-only { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="title">タグ登録モード</h2>

    <div id="play-ui" class="play-only">
        <div class="progress-ring">
            <svg width="200" height="200">
                <circle class="bg-circle" cx="100" cy="100" r="90"></circle>
                <circle id="progress-bar" class="fg-circle" cx="100" cy="100" r="90"></circle>
            </svg>
            <div id="lap-display" class="count-text">0</div>
        </div>
        <p id="step-info">1番目のタグを待機中...</p>
    </div>

    <div id="setup-ui" class="setup-only">
        <div class="tag-list" id="tag-list">登録されたタグ: なし</div>
        <p>タグをかざすと順に登録されます</p>
        <button id="finish-setup" disabled>登録完了（2個以上必要）</button>
    </div>

    <button id="start-nfc">NFCスキャン開始</button>
    <p id="status">ボタンを押してください</p>
</div>

<script>
    let registeredIds = [];
    let isSetupMode = true;
    let currentStep = 0;
    let lapCount = 0;
    const circumference = 2 * Math.PI * 90;

    const startBtn = document.getElementById('start-nfc');
    const finishBtn = document.getElementById('finish-setup');
    const status = document.getElementById('status');
    const progressBar = document.getElementById('progress-bar');
    const lapDisplay = document.getElementById('lap-display');
    const stepInfo = document.getElementById('step-info');

    startBtn.addEventListener('click', async () => {
        if (!('NDEFReader' in window)) {
            status.innerText = "Web NFC非対応です";
            return;
        }
        try {
            const ndef = new NDEFReader();
            await ndef.scan();
            startBtn.style.display = 'none';
            status.innerText = "スキャン待機中...";

            ndef.onreading = event => {
                const tagId = event.serialNumber;
                if (isSetupMode) {
                    handleSetup(tagId);
                } else {
                    handlePlay(tagId);
                }
            };
        } catch (e) { status.innerText = "エラー: " + e; }
    });

    function handleSetup(id) {
        if (!registeredIds.includes(id)) {
            registeredIds.push(id);
            document.getElementById('tag-list').innerText = `登録済み(${registeredIds.length}個): ${registeredIds.join(', ')}`;
            if (registeredIds.length >= 2) finishBtn.disabled = false;
            status.innerText = `${registeredIds.length}個目を登録しました`;
        } else {
            status.innerText = "そのタグは既に登録済みです";
        }
    }

    finishBtn.addEventListener('click', () => {
        isSetupMode = false;
        document.getElementById('setup-ui').style.display = 'none';
        document.getElementById('play-ui').style.display = 'block';
        document.getElementById('title').innerText = "実行モード";
        status.innerText = "順番にかざしてください";
        updateUI();
    });

    function handlePlay(id) {
        if (id === registeredIds[currentStep]) {
            currentStep++;
            if (currentStep >= registeredIds.length) {
                lapCount++;
                currentStep = 0;
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]); // 完了バイブ
            }
            status.innerText = "OK!";
        } else {
            status.innerText = "順番が違います！";
            if (navigator.vibrate) navigator.vibrate(300); // 失敗バイブ
        }
        updateUI();
    }

    function updateUI() {
        // 円形進捗の計算
        const progress = currentStep / registeredIds.length;
        const offset = circumference - (progress * circumference);
        progressBar.style.strokeDashoffset = offset;
        
        lapDisplay.innerText = lapCount;
        stepInfo.innerText = `${currentStep + 1} / ${registeredIds.length} 個目を待機中`;
    }
</script>
</body>
</html>
